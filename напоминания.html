<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Напоминания</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,.12);--border-h:rgba(0,0,0,.25);
    --text:#1a1a1a;--muted:#6b6b68;
    --blue-bg:#e6f1fb;--blue-t:#0c447c;--blue-b:#b5d4f4;
    --amber-bg:#faeeda;--amber-t:#633806;--amber-b:#fac775;
    --red-bg:#fcebeb;--red-t:#791f1f;--red-b:#f7c1c1;
    --green-bg:#eaf3de;--green-t:#27500a;--green-b:#c0dd97;
    --purple-bg:#eeedfe;--purple-t:#3c3489;--purple-b:#afa9ec;
    --accent:#185fa5;--accent-h:#0c447c;
    --r:10px;--rs:6px;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#1a1a18;--surface:#252523;--border:rgba(255,255,255,.1);--border-h:rgba(255,255,255,.25);
    --text:#f0ede8;--muted:#999990;
    --blue-bg:#042c53;--blue-t:#b5d4f4;--blue-b:#185fa5;
    --amber-bg:#412402;--amber-t:#fac775;--amber-b:#854f0b;
    --red-bg:#501313;--red-t:#f7c1c1;--red-b:#a32d2d;
    --green-bg:#173404;--green-t:#c0dd97;--green-b:#3b6d11;
    --purple-bg:#26215c;--purple-t:#cecbf6;--purple-b:#534ab7;
  }}
  @media(prefers-color-scheme:dark){.bl{background:#4a1a5c;color:#e0a0f5;border-color:#8b3dbf}}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem}
  .wrap{max-width:700px;margin:0 auto}
  h1{font-size:22px;font-weight:600;margin-bottom:1.5rem;display:flex;align-items:center;gap:10px}
  .card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
  .fg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
  @media(max-width:540px){.fg{grid-template-columns:1fr 1fr}}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:13px;color:var(--muted);font-weight:500}
  input,textarea,select{font-family:inherit;font-size:14px;background:var(--bg);color:var(--text);border:.5px solid var(--border);border-radius:var(--rs);padding:8px 10px;width:100%;outline:none;transition:border-color .15s}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(24,95,165,.15)}
  textarea{resize:vertical;min-height:64px}
  .frow{margin-bottom:12px}
  .sound-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .sound-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:.5px solid var(--border);border-radius:20px;background:var(--bg);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:var(--text);transition:border-color .15s,background .15s;white-space:nowrap}
  .sound-pill:hover{border-color:var(--border-h);background:var(--surface)}
  .sound-pill.active{border-color:var(--accent);background:var(--blue-bg);color:var(--blue-t)}
  .sound-pill .sicon{font-size:15px}
  .sound-dropdown{display:none;position:relative;width:100%;margin-bottom:14px}
  .sound-dropdown.open{display:block}
  .sd-inner{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:12px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  @media(max-width:500px){.sd-inner{grid-template-columns:repeat(3,1fr)}}
  .ab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 7px;border:.5px solid var(--border);border-radius:var(--rs);background:var(--bg);cursor:pointer;font-family:inherit;color:var(--text);transition:border-color .15s,background .15s;position:relative}
  .ab:hover{border-color:var(--border-h);background:var(--surface)}
  .ab.sel{border-color:var(--accent);background:var(--blue-bg);color:var(--blue-t)}
  .ab .ai{font-size:18px;line-height:1}
  .ab .al{font-size:11px;font-weight:500;text-align:center;line-height:1.3}
  .pb{position:absolute;top:3px;right:3px;background:none;border:none;cursor:pointer;font-size:9px;color:var(--muted);padding:2px 3px;border-radius:3px;line-height:1}
  .pb:hover{color:var(--accent);background:rgba(24,95,165,.1)}
  .upload-zone{border:.5px dashed var(--border-h);border-radius:var(--rs);padding:14px 16px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;font-size:13px;color:var(--muted);margin-top:4px}
  .upload-zone:hover{border-color:var(--accent);background:var(--blue-bg);color:var(--blue-t)}
  .upload-zone.loading{border-color:var(--amber-b);background:var(--amber-bg);color:var(--amber-t);cursor:default}
  .upload-zone.ok{border-style:solid;border-color:var(--green-b);background:var(--green-bg);color:var(--green-t)}
  #file-input{display:none}
  .custom-tracks{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
  .track-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:.5px solid var(--border);border-radius:var(--rs);background:var(--bg);font-size:13px}
  .track-item.sel{border-color:var(--accent);background:var(--blue-bg);color:var(--blue-t)}
  .track-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
  .track-play{background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);padding:2px 5px;border-radius:3px}
  .track-play:hover{color:var(--accent)}
  .track-del{background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);padding:2px 5px;border-radius:3px}
  .track-del:hover{color:var(--red-t);background:var(--red-bg)}
  .sd-sep{grid-column:1/-1;border:none;border-top:.5px solid var(--border);margin:4px 0}
  .btn{font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;border-radius:var(--rs);padding:9px 20px;transition:background .15s,transform .1s;border:.5px solid var(--border);background:var(--surface);color:var(--text)}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-h);border-color:var(--accent-h)}
  .sec-label{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .rlist{display:flex;flex-direction:column;gap:10px}
  .ri{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem;display:flex;align-items:center;gap:12px}
  .ri.ringing{animation:rpulse .7s infinite alternate}
  @keyframes rpulse{from{border-color:#e24b4a;box-shadow:0 0 0 2px rgba(226,75,74,.2)}to{border-color:#f09595;box-shadow:0 0 0 8px rgba(226,75,74,.04)}}
  .ri-body{flex:1;min-width:0}
  .ri-main{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .ri-left{flex:1;min-width:0}
  .ri-title{font-size:22px;font-weight:700;margin-bottom:2px;line-height:1.2}
  .ri-date{font-size:15px;font-weight:500;color:var(--muted);margin-bottom:2px}
  .ri-note{font-size:13px;color:var(--muted);margin-top:2px;white-space:pre-wrap}
  .ri-badges{display:flex;flex-direction:column;gap:6px;align-items:stretch;flex-shrink:0;min-width:155px}
  .badge{font-size:13px;padding:5px 12px;border-radius:var(--rs);border:.5px solid;font-weight:600;white-space:nowrap;text-align:center}
  .bb{background:var(--blue-bg);color:var(--blue-t);border-color:var(--blue-b)}
  .ba{background:var(--amber-bg);color:var(--amber-t);border-color:var(--amber-b)}
  .br{background:var(--red-bg);color:var(--red-t);border-color:var(--red-b)}
  .bg{background:var(--green-bg);color:var(--green-t);border-color:var(--green-b)}
  .bp{background:var(--purple-bg);color:var(--purple-t);border-color:var(--purple-b)}
  .bl{background:#4a1a5c;color:#e0a0f5;border-color:#8b3dbf}
  .del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:4px 6px;border-radius:var(--rs);flex-shrink:0;line-height:1;transition:background .15s,color .15s}
  .del-btn:hover{background:var(--red-bg);color:var(--red-t)}
  .empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:14px}
  #ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;align-items:center;justify-content:center}
  #ov.show{display:flex}
  .abox{background:var(--surface);border-radius:var(--r);padding:2rem 2rem 1.5rem;max-width:400px;width:92%;text-align:center;border:2px solid #e24b4a;animation:rpulse .7s infinite alternate}
  .aemoji{font-size:52px;margin-bottom:12px;display:block}
  .atitle{font-size:20px;font-weight:600;margin-bottom:8px}
  .ameta{font-size:14px;color:var(--muted);margin-bottom:1.25rem;white-space:pre-wrap}
  .abtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .snooze-row{margin-bottom:1rem}
  .snooze-row label{font-size:13px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px}
  .snooze-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
  .sz-btn{font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border-radius:20px;padding:5px 14px;border:.5px solid var(--border);background:var(--bg);color:var(--text);transition:background .15s,border-color .15s}
  .sz-btn:hover{border-color:var(--accent);background:var(--blue-bg);color:var(--blue-t)}
  .sz-btn.picked{background:var(--accent);border-color:var(--accent);color:#fff}
  .priority-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .priority-label{font-size:13px;color:var(--muted);font-weight:500;white-space:nowrap}
  .prio-btn{width:30px;height:30px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;outline:none}
  .prio-btn:hover{transform:scale(1.18)}
  .prio-btn.sel{border-color:#fff;box-shadow:0 0 0 2px rgba(0,0,0,.35)}
  .prio-red{background:#e24b4a}
  .prio-amber{background:#f0a820}
  .prio-green{background:#4caf50}
  .prio-none{background:var(--border-h);border-color:var(--border)}
  /* Edit button in reminder list */
  .edit-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px 6px;border-radius:var(--rs);flex-shrink:0;line-height:1;transition:background .15s,color .15s}
  .edit-btn:hover{background:var(--blue-bg);color:var(--blue-t)}
  /* Edit modal */
  #edit-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:1rem}
  #edit-ov.show{display:flex}
  .edit-box{background:var(--surface);border-radius:var(--r);padding:1.5rem;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;border:.5px solid var(--border)}
  .edit-box h2{font-size:17px;font-weight:600;margin-bottom:1rem}
  .edit-sound-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .edit-sound-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:.5px solid var(--border);border-radius:20px;background:var(--bg);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:var(--text);transition:border-color .15s,background .15s}
  .edit-sound-pill.active{border-color:var(--accent);background:var(--blue-bg);color:var(--blue-t)}
  .edit-sound-dd{display:none;border:.5px solid var(--border);border-radius:var(--r);padding:10px;display:none;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
  .edit-sound-dd.open{display:grid}
  @media(max-width:400px){.edit-sound-dd{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔔 Напоминания</h1>
  <div class="card">
    <div class="fg">
      <div class="field"><label>Дата</label><input type="date" id="inp-date"></div>
      <div class="field"><label>Время события</label>
        <div style="display:flex;gap:6px;align-items:center">
          <select id="inp-time-h" style="flex:1;text-align:center" onchange="onHourChange()">
            <option value="" disabled selected>чч</option>
            <option>00</option><option>01</option><option>02</option><option>03</option>
            <option>04</option><option>05</option><option>06</option><option>07</option>
            <option>08</option><option>09</option><option>10</option><option>11</option>
            <option>12</option><option>13</option><option>14</option><option>15</option>
            <option>16</option><option>17</option><option>18</option><option>19</option>
            <option>20</option><option>21</option><option>22</option><option>23</option>
          </select>
          <span style="font-weight:700;color:var(--muted)">:</span>
          <select id="inp-time-m" style="flex:1;text-align:center">
            <option value="" disabled selected>мм</option>
            <option>00</option><option>05</option><option>10</option><option>15</option>
            <option>20</option><option>25</option><option>30</option><option>35</option>
            <option>40</option><option>45</option><option>50</option><option>55</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Напомнить за</label>
        <select id="inp-before">
          <option value="0">В само время</option>
          <option value="5">5 минут</option>
          <option value="10">10 минут</option>
          <option value="15">15 минут</option>
          <option value="30">30 минут</option>
          <option value="60">1 час</option>
          <option value="120">2 часа</option>
          <option value="180">3 часа</option>
          <option value="240">4 часа</option>
          <option value="300">5 часов</option>
          <option value="360">6 часов</option>
          <option value="720">12 часов</option>
          <option value="1440" selected>1 день</option>
        </select>
      </div>
    </div>
    <div class="fg" style="margin-bottom:12px">
      <div class="field">
        <label>Повторять после срабатывания</label>
        <select id="inp-repeat">
          <option value="0">Не повторять</option>
          <option value="5">каждые 5 мин</option>
          <option value="10">каждые 10 мин</option>
          <option value="15">каждые 15 мин</option>
          <option value="30">каждые 30 мин</option>
          <option value="60">каждый час</option>
          <option value="120">каждые 2 часа</option>
          <option value="180">каждые 3 часа</option>
          <option value="300">каждые 5 часов</option>
          <option value="360">каждые 6 часов</option>
          <option value="720">каждые 12 часов</option>
          <option value="1440">каждый день</option>
        </select>
      </div>
      <div class="field" id="repeat-until-field">
        <label>Останавливать повтор</label>
        <select id="inp-repeat-until">
          <option value="0">Не останавливать</option>
          <option value="3">через 3 повтора</option>
          <option value="5">через 5 повторов</option>
          <option value="10">через 10 повторов</option>
          <option value="24">через 24 повтора</option>
        </select>
      </div>
    </div>
    <div class="frow"><div class="field"><label>Название / причина</label><input type="text" id="inp-title" placeholder="Например: Приём у врача"></div></div>
    <div class="frow"><div class="field"><label>Заметка (необязательно)</label><textarea id="inp-note" placeholder="Адрес, номер кабинета, что взять с собой..."></textarea></div></div>
    <div class="frow">
      <div class="sound-label" style="font-size:13px;color:var(--muted);font-weight:500;margin-bottom:8px">Звуковой эффект</div>
      <div class="sound-row" id="sound-row"></div>
      <div class="sound-dropdown" id="sound-dd">
        <div class="sd-inner" id="sd-inner"></div>
      </div>
    </div>
    <div class="priority-row">
      <span class="priority-label">Важность:</span>
      <button type="button" class="prio-btn prio-none sel" id="prio-none" onclick="selectPriority('none')" title="Без цвета"></button>
      <button type="button" class="prio-btn prio-red" id="prio-red" onclick="selectPriority('red')" title="Очень важно (красный)"></button>
      <button type="button" class="prio-btn prio-amber" id="prio-amber" onclick="selectPriority('amber')" title="Средне важно (жёлтый)"></button>
      <button type="button" class="prio-btn prio-green" id="prio-green" onclick="selectPriority('green')" title="Не очень важно (зелёный)"></button>
      <span id="prio-hint" style="font-size:12px;color:var(--muted);margin-left:4px"></span>
    </div>
    <button class="btn btn-primary" onclick="addReminder()">+ Добавить напоминание</button>
  </div>
  <div class="sec-label">Мои напоминания</div>
  <div class="rlist" id="list"><div class="empty">Напоминаний пока нет</div></div>
</div>

<div id="ov">
  <div class="abox">
    <span class="aemoji" id="aemoji">🔔</span>
    <div class="atitle" id="atitle"></div>
    <div class="ameta"  id="ameta"></div>
    <div class="snooze-row">
      <label>Отложить напоминание на:</label>
      <div class="snooze-grid" id="snooze-grid"></div>
    </div>
    <div id="ios-sound-btn" style="display:none;margin-bottom:12px">
      <button class="btn" style="background:#e24b4a;color:#fff;border-color:#e24b4a;width:100%;font-size:15px" onclick="iosTapPlay()">🔊 Нажмите чтобы включить звук</button>
    </div>
    <div class="abtns">
      <button class="btn btn-primary" onclick="doSnooze()">Отложить</button>
      <button class="btn" onclick="dismissCurrent()">Закрыть</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="audio/*" multiple>

<!-- Edit Reminder Modal -->
<div id="edit-ov">
  <div class="edit-box">
    <h2>✏️ Изменить напоминание</h2>
    <input type="hidden" id="edit-id">
    <div class="fg">
      <div class="field"><label>Дата</label><input type="date" id="edit-date"></div>
      <div class="field"><label>Время</label>
        <div style="display:flex;gap:6px;align-items:center">
          <select id="edit-time-h" style="flex:1;text-align:center" onchange="onEditHourChange()">
            <option value="" disabled selected>чч</option>
            <option>00</option><option>01</option><option>02</option><option>03</option>
            <option>04</option><option>05</option><option>06</option><option>07</option>
            <option>08</option><option>09</option><option>10</option><option>11</option>
            <option>12</option><option>13</option><option>14</option><option>15</option>
            <option>16</option><option>17</option><option>18</option><option>19</option>
            <option>20</option><option>21</option><option>22</option><option>23</option>
          </select>
          <span style="font-weight:700;color:var(--muted)">:</span>
          <select id="edit-time-m" style="flex:1;text-align:center">
            <option value="" disabled selected>мм</option>
            <option>00</option><option>05</option><option>10</option><option>15</option>
            <option>20</option><option>25</option><option>30</option><option>35</option>
            <option>40</option><option>45</option><option>50</option><option>55</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Напомнить за</label>
        <select id="edit-before">
          <option value="0">В само время</option>
          <option value="5">5 минут</option>
          <option value="10">10 минут</option>
          <option value="15">15 минут</option>
          <option value="30">30 минут</option>
          <option value="60">1 час</option>
          <option value="120">2 часа</option>
          <option value="180">3 часа</option>
          <option value="240">4 часа</option>
          <option value="300">5 часов</option>
          <option value="360">6 часов</option>
          <option value="720">12 часов</option>
          <option value="1440">1 день</option>
        </select>
      </div>
    </div>
    <div class="fg" style="margin-bottom:12px">
      <div class="field"><label>Повторять</label>
        <select id="edit-repeat">
          <option value="0">Не повторять</option>
          <option value="5">каждые 5 мин</option>
          <option value="10">каждые 10 мин</option>
          <option value="15">каждые 15 мин</option>
          <option value="30">каждые 30 мин</option>
          <option value="60">каждый час</option>
          <option value="120">каждые 2 часа</option>
          <option value="180">каждые 3 часа</option>
          <option value="300">каждые 5 часов</option>
          <option value="360">каждые 6 часов</option>
          <option value="720">каждые 12 часов</option>
          <option value="1440">каждый день</option>
        </select>
      </div>
      <div class="field"><label>Останавливать</label>
        <select id="edit-repeat-until">
          <option value="0">Не останавливать</option>
          <option value="3">через 3 повтора</option>
          <option value="5">через 5 повторов</option>
          <option value="10">через 10 повторов</option>

function tn(ctx,type,freq,start,dur,vol){
  try{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0,start);
    g.gain.linearRampToValueAtTime(vol,start+.015);
    g.gain.exponentialRampToValueAtTime(.001,start+dur);
    o.start(start);o.stop(start+dur+.05);
  }catch(e){}
}

const IDB_STORE='tracks';

function openIDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=e=>{
      e.target.result.createObjectStore(IDB_STORE,{keyPath:'id'});
    };
    req.onsuccess=e=>{res(e.target.result);};
    req.onerror=e=>{rej(e.target.error);};
  });
}

async function idbSave(track){ // track = {id, name, blob}
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(track);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}

async function idbGet(id){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readonly');
    const req=tx.objectStore(IDB_STORE).get(id);
    req.onsuccess=e=>res(e.target.result||null);
    req.onerror=e=>rej(e.target.error);
  });
}

async function idbDelete(id){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).delete(id);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}

// object URL кэш: id -> objectURL
const urlCache={};

function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

// Получить URL для воспроизведения (создаёт ObjectURL из Blob)
async function getAudioURL(id){
  if(urlCache[id]) return urlCache[id];
  const track=await idbGet(id);
  if(!track) return null;
  const url=URL.createObjectURL(track.blob);
  urlCache[id]=url;
  return url;
}

// ─── Play ─────────────────────────────────────────────────────────────────────
function stopAlarmAudio(){
  if(alarmAudio){alarmAudio.pause();alarmAudio.src='';alarmAudio=null;}
}

async function playSound(id,loop){
  if(id==='silent') return;
  stopAlarmAudio();
  const b=BUILTINS.find(x=>x.id===id);
  if(b){b.play(getCtx());return;}
  // встроенный зашитый трек
  const e=EMBEDDED_TRACKS.find(x=>x.id===id);
  if(e){
    alarmAudio=new Audio(e.dataUrl);
    if(loop) alarmAudio.loop=true;
    alarmAudio.play().catch(err=>console.warn('Audio error:',err));
    return;
  }
  // кастомный трек из IndexedDB
  const url=await getAudioURL(id);
  if(!url){console.warn('Track not found:',id);return;}
  alarmAudio=new Audio(url);
  if(loop) alarmAudio.loop=true;
  alarmAudio.play().catch(e=>console.warn('Audio play error:',e));
}

async function previewSound(id){
  // Если этот трек уже играет — останавливаем (toggle)
  if(alarmAudio && alarmAudio._previewId===id && !alarmAudio.paused){
    stopAlarmAudio();
    updateAllPlayBtns();
    return;
  }
  stopAlarmAudio();
  const b=BUILTINS.find(x=>x.id===id);
  if(b){b.play(getCtx());return;}
  // встроенный зашитый трек
  const e=EMBEDDED_TRACKS.find(x=>x.id===id);
  let audioSrc=null;
  if(e){
    audioSrc=e.dataUrl;
  } else {
    audioSrc=await getAudioURL(id);
  }
  if(!audioSrc) return;
  alarmAudio=new Audio(audioSrc);
  alarmAudio._previewId=id;
  alarmAudio.play().catch(()=>{});
  updateAllPlayBtns();
  alarmAudio.addEventListener('ended',()=>{
    if(alarmAudio&&alarmAudio._previewId===id) alarmAudio=null;
    updateAllPlayBtns();
  });
  alarmAudio.addEventListener('pause',()=>updateAllPlayBtns());
  alarmAudio.addEventListener('play',()=>updateAllPlayBtns());
}

function updateAllPlayBtns(){
  // Обновляем иконки всех кнопок прослушивания
  document.querySelectorAll('[data-preview-id]').forEach(btn=>{
    const id=btn.getAttribute('data-preview-id');
    const isPlaying=alarmAudio&&alarmAudio._previewId===id&&!alarmAudio.paused;
    btn.textContent=isPlaying?'⏹':'▶';
    btn.title=isPlaying?'Остановить':'Послушать';
  });
}

function soundMeta(id){
  const b=BUILTINS.find(x=>x.id===id);
  if(b) return{icon:b.icon,label:b.label};
  const e=EMBEDDED_TRACKS.find(x=>x.id===id);
  if(e) return{icon:e.icon,label:e.name};
  const c=customTracks.find(x=>x.id===id);
  if(c) return{icon:'🎧',label:c.name};
  return{icon:'🔔',label:'Колокол'};
}

// ─── File upload ──────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change',async function(){
  const files=Array.from(this.files);
  if(!files.length) return;
  const zone=document.getElementById('upload-zone');
  zone.className='upload-zone loading';
  zone.textContent='⏳ Загружаю...';

  for(const f of files){
    const id='custom_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const name=f.name.replace(/\.[^.]+$/,'');
    try{
      // сохраняем Blob напрямую в IndexedDB — без base64, без лимитов
      await idbSave({id, name, blob: f});
      // метаданные (только id+name) — в localStorage
      customTracks.push({id,name});
      localStorage.setItem('custom_tracks_meta',JSON.stringify(customTracks));
      // Выбираем трек но НЕ играем — пользователь сам нажмёт ▶ чтобы послушать
      selectedSound=id;
      localStorage.setItem('sel_sound',id);
      const mm=soundMeta(id);
      const pl=document.getElementById('pill-label');
      const pi=document.querySelector('#sound-toggle .sicon');
      if(pl) pl.textContent=mm.label;
      if(pi) pi.textContent=mm.icon;
      buildSoundSelector();
      zone.className='upload-zone ok';
      zone.textContent='✅ Загружено: '+name+' — нажмите ▶ чтобы послушать';
      setTimeout(()=>{zone.className='upload-zone';zone.textContent='🎵 Нажмите чтобы загрузить аудио файл';},4000);
    }catch(err){
      console.error('Upload error:',err);
      zone.className='upload-zone';
      zone.textContent='❌ Ошибка загрузки. Попробуйте ещё раз.';
      setTimeout(()=>{zone.textContent='🎵 Нажмите чтобы загрузить аудио файл';},3000);
    }
  }
  this.value='';
});

async function deleteTrack(id){
  customTracks=customTracks.filter(t=>t.id!==id);
  localStorage.setItem('custom_tracks_meta',JSON.stringify(customTracks));
  await idbDelete(id);
  if(urlCache[id]){URL.revokeObjectURL(urlCache[id]);delete urlCache[id];}
  if(selectedSound===id){selectedSound='twitter';localStorage.setItem('sel_sound','twitter');}
  buildSoundSelector();
}

function onHourChange(){
  const mSel=document.getElementById('inp-time-m');
  if(!mSel.value||mSel.value===''){mSel.value='00';}
  mSel.focus();
}

function addReminder(){
  const date=document.getElementById('inp-date').value;
  const h=document.getElementById('inp-time-h').value;
  const m=document.getElementById('inp-time-m').value;
  const time=(h&&m)?`${h}:${m}`:'';
  const title=document.getElementById('inp-title').value.trim();
  const note=document.getElementById('inp-note').value.trim();
  const before=parseInt(document.getElementById('inp-before').value);
  const repeat=parseInt(document.getElementById('inp-repeat').value);
  const repeatUntil=parseInt(document.getElementById('inp-repeat-until').value);
  if(!date||!time||!title){alert('Пожалуйста, заполните дату, время и название.');return;}
  const eventMs=new Date(date+'T'+time).getTime();
  const alertMs=eventMs-before*60000;
  const nr={id:Date.now(),date,time,title,note,before,eventMs,alertMs,sound:selectedSound,fired:false,repeat,repeatUntil,repeatCount:0,priority:selectedPriority};
  reminders.push(nr);
  reminders.sort((a,b)=>a.eventMs-b.eventMs);
  dbSave(nr);render();
  document.getElementById('inp-title').value='';
  document.getElementById('inp-note').value='';
  selectPriority('none');
  if(ddOpen) toggleDD();
}

function changeReminderPriority(id, p){
  const r=reminders.find(x=>x.id===id);
  if(!r) return;
  r.priority=p;
  dbUpdate(r);
  render();
  updateCountdowns();
}

function deleteReminder(id){
  reminders=reminders.filter(r=>r.id!==id);
  if(currentAlarmId===id) dismissCurrent();
  dbDelete(id);render();
}

const SNOOZE_OPTIONS=[
  {label:'5 мин',mins:5},{label:'15 мин',mins:15},{label:'30 мин',mins:30},
  {label:'1 час',mins:60},{label:'3 часа',mins:180},{label:'6 часов',mins:360},

];

function buildSnoozeGrid(){
  pickedSnooze=5;
  document.getElementById('snooze-grid').innerHTML=SNOOZE_OPTIONS.map(o=>`
    <button class="sz-btn${o.mins===5?' picked':''}" onclick="pickSnooze(${o.mins},this)">${o.label}</button>`).join('');
}

function pickSnooze(mins,btn){
  pickedSnooze=mins;
  document.querySelectorAll('.sz-btn').forEach(b=>b.classList.remove('picked'));
  btn.classList.add('picked');

function iosTapPlay(){
  // iOS требует воспроизведения в обработчике пользовательского жеста
  document.getElementById('ios-sound-btn').style.display='none';
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
  if(currentAlarmId!==null){
    const r=reminders.find(x=>x.id===currentAlarmId);
    if(r) playSound(r.sound,true);
  }
}

async function processQueue(){
  if(!ringQueue.length) return;
  const id=ringQueue[0];
  const r=reminders.find(x=>x.id===id);
  if(!r){ringQueue.shift();processQueue();return;}
  currentAlarmId=id;
  const m=soundMeta(r.sound);
  document.getElementById('aemoji').textContent=m.icon;
  document.getElementById('atitle').textContent=r.title;
  document.getElementById('ameta').textContent=(r.note?r.note+'\n':'')+fmtDT(r.date,r.time);
  buildSnoozeGrid();
  document.getElementById('ov').classList.add('show');
  // iOS Safari блокирует автозвук — показываем кнопку "нажмите для звука"
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||
    (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  document.getElementById('ios-sound-btn').style.display=(isIOS&&r.sound!=='silent')?'block':'none';
  if(bellInterval){clearInterval(bellInterval);bellInterval=null;}
  const isCustom=!!customTracks.find(x=>x.id===r.sound)||
    !!EMBEDDED_TRACKS.find(x=>x.id===r.sound);
  if(isCustom){
    // Кастомный/встроенный трек — играем один раз с loop, не перезапускаем
    if(!alarmAudio||alarmAudio.paused||alarmAudio.ended){
      await playSound(r.sound,true);
    }
  } else {
    if(r.sound!=='silent'){
      playSound(r.sound,false);
      bellInterval=setInterval(()=>{
        if(!alarmAudio||alarmAudio.paused||alarmAudio.ended) playSound(r.sound,false);
      },5000);
    }
  }
  render();
}

function doSnooze(){
  if(currentAlarmId!==null){
    const r=reminders.find(x=>x.id===currentAlarmId);
    if(r){r.alertMs=Date.now()+pickedSnooze*60000;r.fired=false;dbUpdate(r);}
  }
  closealarm();
}

function dismissCurrent(){
  if(currentAlarmId!==null){
    const r=reminders.find(x=>x.id===currentAlarmId);
    if(r){
      // Проверяем нужно ли повторить
      if(r.repeat && r.repeat > 0){
        r.repeatCount = (r.repeatCount||0) + 1;
        const maxRepeats = r.repeatUntil || 0;
        if(maxRepeats === 0 || r.repeatCount < maxRepeats){
          // Ставим следующий повтор
          r.alertMs = Date.now() + r.repeat * 60000;
          r.fired = false;
        } else {
          // Исчерпали лимит повторов
          r.fired = true;
        }
      } else {
        r.fired = true;
      }
      dbUpdate(r);
    }
  }
  closealarm();
}

function closealarm(){
  stopAlarmAudio();
  document.getElementById('ov').classList.remove('show');
  if(bellInterval){clearInterval(bellInterval);bellInterval=null;}
  currentAlarmId=null;
  ringQueue.shift();
  processQueue();
  render();
}

function checkAlarms(){
  const now=Date.now();
  reminders.forEach(r=>{
    if(!r.fired&&now>=r.alertMs&&now<r.eventMs+3600000){
      if(!ringQueue.includes(r.id)){ringQueue.push(r.id);if(ringQueue.length===1)processQueue();}
    }
  });
}

// ─── Render ───────────────────────────────────────────────────────────────────
function fmtDT(date,time){const[y,m,d]=date.split('-');return`${d}.${m}.${y} в ${time}`;}
function blabel(b){if(b===0)return'в само время';if(b<60)return`за ${b} мин`;if(b<1440)return`за ${b/60} ч`;return`за ${b/1440} д`;}
function rlabel(r){if(r<60)return`каждые ${r} мин`;if(r===60)return'каждый час';if(r<1440)return`каждые ${r/60} ч`;return'каждый день';}
function stInfo(r){
  const now=Date.now();
  if(r.fired&&r.eventMs>now) return['Получено','bg'];
  if(r.eventMs<now) return['Прошло','br'];
  const diff=r.eventMs-now;
  if(diff<0) return['Скоро!','ba'];
  const m=Math.round(diff/60000);
  const rep=r.repeatCount?` (повтор ${r.repeatCount})`:'';
  if(m<60) return[`через ${m} мин${rep}`,'bb'];
  if(m<1440) return[`через ${Math.round(m/60)} ч${rep}`,'bb'];
  return[`через ${Math.round(m/1440)} д${rep}`,'bb'];
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function fmtCountdown(ms){
  if(ms<=0) return'Сейчас!';
  const totalSec=Math.floor(ms/1000);
  const d=Math.floor(totalSec/86400);
  const h=Math.floor((totalSec%86400)/3600);
  const m=Math.floor((totalSec%3600)/60);
  const s=totalSec%60;
  const pad=n=>String(n).padStart(2,'0');
  if(d>0) return`через ${d}д ${pad(h)}:${pad(m)}:${pad(s)}`;
  if(h>0) return`через ${pad(h)}:${pad(m)}:${pad(s)}`;
  return`через ${pad(m)}:${pad(s)}`;
}

function updateCountdowns(){
  const now=Date.now();
  reminders.forEach(r=>{
    const el=document.getElementById('cd-'+r.id);
    if(!el) return;
    if(r.fired||r.eventMs<now){
      el.textContent=r.eventMs<now?'Прошло':'Получено';
      return;
    }
    const diff=r.eventMs-now;
    if(diff<0){el.textContent='Скоро!';return;}
    el.textContent=fmtCountdown(diff);
  });
}

function render(){
  const list=document.getElementById('list');
  if(!reminders.length){list.innerHTML='<div class="empty">Напоминаний пока нет</div>';return;}
  list.innerHTML=reminders.map(r=>{
    const m=soundMeta(r.sound);
    const ringing=currentAlarmId===r.id;
    const now2=Date.now();
    const cdCls=r.fired?'bg':r.eventMs<now2?'br':r.alertMs-now2<0?'ba':'bb';
    const prioColors={red:'#e24b4a',amber:'#f0a820',green:'#4caf50',none:''};
    const prioStyle=r.priority&&r.priority!=='none'?`color:${prioColors[r.priority]}`:'';
    return`<div class="ri${ringing?' ringing':''}" id="ri-${r.id}">
      <div class="ri-body">
        <div class="ri-main">
          <div class="ri-left">
            <div class="ri-title" style="${prioStyle}">${esc(r.title)}</div>
            <div class="ri-date" style="${prioStyle}">${fmtDT(r.date,r.time)}</div>
            ${r.note?`<div class="ri-note">${esc(r.note)}</div>`:''}
            <div style="display:flex;gap:6px;margin-top:7px">
              <button type="button" class="prio-btn prio-none${!r.priority||r.priority==='none'?' sel':''}" onclick="changeReminderPriority(${r.id},'none')" title="Без цвета" style="width:18px;height:18px;flex-shrink:0"></button>
              <button type="button" class="prio-btn prio-red${r.priority==='red'?' sel':''}" onclick="changeReminderPriority(${r.id},'red')" title="Очень важно" style="width:18px;height:18px;flex-shrink:0"></button>
              <button type="button" class="prio-btn prio-amber${r.priority==='amber'?' sel':''}" onclick="changeReminderPriority(${r.id},'amber')" title="Средне важно" style="width:18px;height:18px;flex-shrink:0"></button>
              <button type="button" class="prio-btn prio-green${r.priority==='green'?' sel':''}" onclick="changeReminderPriority(${r.id},'green')" title="Мало важно" style="width:18px;height:18px;flex-shrink:0"></button>
            </div>
          </div>
          <div class="ri-badges">
            <span class="badge ${cdCls} countdown" id="cd-${r.id}"></span>
            <span class="badge bl">напомнить ${blabel(r.before)}</span>
            ${r.repeat?`<span class="badge bp">🔁 ${rlabel(r.repeat)}</span>`:''}
          </div>
        </div>
      </div>
      <button class="edit-btn" onclick="openEditModal(${r.id})" title="Изменить">✏️</button>
      <button class="del-btn" onclick="deleteReminder(${r.id})" title="Удалить">✕</button>
    </div>`;
  }).join('');
}

// ─── Edit Modal ───────────────────────────────────────────────────────────────
let editDDOpen=false;
let editSelectedSound='twitter';
let editSelectedPriority='none';

function buildEditSoundSelector(){
  const inner=document.getElementById('edit-sd-inner');
  inner.innerHTML=BUILTINS.map(s=>`
    <button class="ab${s.id===editSelectedSound?' sel':''}" id="eab-${s.id}" onclick="selectEditSound('${s.id}')">
      <span class="pb" onclick="event.stopPropagation();previewSound('${s.id}')" title="Послушать">▶</span>
      <span class="ai">${s.icon}</span>
      <span class="al">${s.label}</span>
    </button>`).join('')+
    (EMBEDDED_TRACKS.length?'<hr class="sd-sep"><div style="grid-column:1/-1;font-size:11px;color:var(--muted);margin-bottom:4px">Зашитые мелодии</div>':'')+
    EMBEDDED_TRACKS.map(s=>`
    <button class="ab${s.id===editSelectedSound?' sel':''}" id="eab-${s.id}" onclick="selectEditSound('${s.id}')">
      <span class="pb" onclick="event.stopPropagation();previewSound('${s.id}')" title="Послушать">▶</span>
      <span class="ai">${s.icon}</span>
      <span class="al">${s.name}</span>
    </button>`).join('')+
    (customTracks.length?'<hr class="sd-sep"><div style="grid-column:1/-1;font-size:11px;color:var(--muted);margin-bottom:4px">Свои мелодии</div>':'')+
    customTracks.map(t=>`
    <button class="ab${t.id===editSelectedSound?' sel':''}" id="eab-${t.id}" onclick="selectEditSound('${t.id}')">
      <span class="ai">🎧</span>
      <span class="al">${esc(t.name)}</span>
    </button>`).join('');
}

function toggleEditDD(){
  editDDOpen=!editDDOpen;
  document.getElementById('edit-sound-dd').classList.toggle('open',editDDOpen);
  document.getElementById('edit-pill-arrow').textContent=editDDOpen?'▴':'▾';
}

function selectEditSound(id){
  editSelectedSound=id;
  document.querySelectorAll('#edit-sd-inner .ab').forEach(b=>b.classList.remove('sel'));
  const btn=document.getElementById('eab-'+id);
  if(btn) btn.classList.add('sel');
  const m=soundMeta(id);
  document.getElementById('edit-sound-icon').textContent=m.icon;
  document.getElementById('edit-sound-label').textContent=m.label;
}

function selectEditPriority(p){
  editSelectedPriority=p;
  ['none','red','amber','green'].forEach(x=>{
    const b=document.getElementById('edit-prio-'+x);
    if(b) b.classList.toggle('sel',x===p);
  });
}

function onEditHourChange(){
  const mSel=document.getElementById('edit-time-m');
  if(!mSel.value||mSel.value===''){mSel.value='00';}
  mSel.focus();
}

function openEditModal(id){
  const r=reminders.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('edit-id').value=id;
  document.getElementById('edit-date').value=r.date;
  document.getElementById('edit-title').value=r.title;
  document.getElementById('edit-note').value=r.note||'';
  // Time
  const [h,m]=r.time.split(':');
  document.getElementById('edit-time-h').value=h;
  document.getElementById('edit-time-m').value=m;
  // Before / repeat
  document.getElementById('edit-before').value=r.before;
  document.getElementById('edit-repeat').value=r.repeat||0;
  document.getElementById('edit-repeat-until').value=r.repeatUntil||0;
  // Sound
  editSelectedSound=r.sound||'twitter';
  const m2=soundMeta(editSelectedSound);
  document.getElementById('edit-sound-icon').textContent=m2.icon;
  document.getElementById('edit-sound-label').textContent=m2.label;
  editDDOpen=false;
  document.getElementById('edit-sound-dd').classList.remove('open');
  document.getElementById('edit-pill-arrow').textContent='▾';
  buildEditSoundSelector();
  // Priority
  selectEditPriority(r.priority||'none');
  document.getElementById('edit-ov').classList.add('show');
}

function closeEditModal(){
  stopAlarmAudio();
  document.getElementById('edit-ov').classList.remove('show');
  editDDOpen=false;
  document.getElementById('edit-sound-dd').classList.remove('open');
}

async function saveEdit(){
  const id=parseInt(document.getElementById('edit-id').value);
  const r=reminders.find(x=>x.id===id);
  if(!r){closeEditModal();return;}
  const date=document.getElementById('edit-date').value;
  const hh=document.getElementById('edit-time-h').value;
  const mm=document.getElementById('edit-time-m').value;
  const title=document.getElementById('edit-title').value.trim();
  if(!date||!hh||!mm||!title){alert('Пожалуйста, заполните дату, время и название.');return;}
  const time=`${hh}:${mm}`;
  const before=parseInt(document.getElementById('edit-before').value);
  const repeat=parseInt(document.getElementById('edit-repeat').value);
  const repeatUntil=parseInt(document.getElementById('edit-repeat-until').value);
  const note=document.getElementById('edit-note').value.trim();
  const eventMs=new Date(date+'T'+time).getTime();
  const alertMs=eventMs-before*60000;
  r.date=date; r.time=time; r.title=title; r.note=note;
  r.before=before; r.repeat=repeat; r.repeatUntil=repeatUntil;
  r.eventMs=eventMs; r.alertMs=alertMs;
  r.sound=editSelectedSound; r.priority=editSelectedPriority;
  r.fired=false; r.repeatCount=0;
  reminders.sort((a,b)=>a.eventMs-b.eventMs);
  // Save full row to Supabase
  const row={id:r.id,date:r.date,time:r.time,title:r.title,note:r.note,
    before:r.before,repeat:r.repeat,repeat_until:r.repeatUntil,
    alert_ms:r.alertMs,event_ms:r.eventMs,fired:r.fired,
    sound:r.sound,repeat_count:r.repeatCount,priority:r.priority};
  try{
    await fetch(SUPA_URL+'/rest/v1/Reminders',{
      method:'POST',
      headers:{...SUPA_HEADERS,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(row)
    });
  }catch(e){console.warn('Supabase update error:',e);}
  closeEditModal();
  render();
  updateCountdowns();
}

// Close edit modal on overlay click
document.getElementById('edit-ov').addEventListener('click',function(e){
  if(e.target===this) closeEditModal();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
const today=new Date();
const pad=n=>String(n).padStart(2,'0');
document.getElementById('inp-date').value=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
buildSoundSelector();
render();
dbLoad();
setInterval(()=>{checkAlarms();render();updateCountdowns();},10000);
setInterval(()=>{updateCountdowns();},1000);
// Синхронизация с облаком каждые 30 секунд
setInterval(()=>{dbLoad();},30000);
</script>
